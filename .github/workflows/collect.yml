name: collect
# Forward ADS-B collector for flightradar.jaime.win — runs on GitHub's clean
# runner IP (the community feeds + OpenSky throttle Cloudflare's shared Worker
# IPs). Public repo => free unlimited Actions minutes.
#
# Each run self-loops (see collect.py LOOP_SECONDS), polling every ~25s and
# pushing each snapshot, so freshness is ~25s rather than the cron interval.

on:
  schedule:
    # Fire every 5 min (GitHub's finest granularity; it often lags under load).
    # Each run loops for ~4.5 min, so back-to-back runs give near-continuous
    # coverage. Gaps when GitHub delays a run are harmless for a density map.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Avoid overlapping runs if one is slow.
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect and push
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          LOOP_SECONDS: "270"
          INTERVAL_SECONDS: "25"
        run: python3 collect.py
