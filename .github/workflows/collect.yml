name: collect
# Forward ADS-B collector for flightradar.jaime.win — runs on GitHub's clean
# runner IP (the community feeds throttle Cloudflare's shared Worker IPs).
# Public repo => free unlimited Actions minutes.

on:
  schedule:
    # GitHub cron granularity is ~5 min and often lags under load. Every 10 min
    # is a realistic, reliable cadence for a density map.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Avoid overlapping runs if one is slow.
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect and push
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: python3 collect.py
